<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tse</title>
    <style>
        :root {
            --g: #1D9E75;
            --gl: #E1F5EE;
            --p: #534AB7;
            --pl: #EEEDFE;
            --o: #BA7517;
            --ol: #FEF3E2;
            --b: #1E7FD8;
            --bl: #E6F1FB;
            --r: #C0392B;
            --bg: #F6F6F4;
            --card: #fff;
            --bdr: #E4E3DF;
            --tx: #1A1916;
            --sub: #686764;
            --rd: 12px;
            --rs: 8px;
            --coffee: #6B3A2A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.55;
        }

        .w {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* ── Page header ── */
        .page-header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .hero-sub {
            color: var(--sub);
            font-size: 13px;
        }

        /* ── Category label ── */
        .cat-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--sub);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        /* ── Cards grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }


        /* ── Travel card ── */
        .travel-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: var(--rd);
            overflow: hidden;
            transition: box-shadow .2s, border-color .2s;
            cursor: pointer;
        }

        .travel-card:hover {
            border-color: var(--p);
            box-shadow: 0 4px 18px rgba(83,74,183,.12);
        }

        .card-header {
            background: linear-gradient(135deg, var(--p) 0%, #7B3FA3 100%);
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            width: 100%;
            text-align: left;
            user-select: none;
        }

        .card-header:hover { background: linear-gradient(135deg,#4A3A9B 0%,#6B3894 100%); }

        /* coffee variant */
        .travel-card.coffee-card { }
        .travel-card.coffee-card:hover {
            border-color: var(--coffee);
            box-shadow: 0 4px 18px rgba(107,58,42,.12);
        }
        .coffee-card .card-header {
            background: linear-gradient(135deg, var(--coffee) 0%, #3E1F0D 100%);
        }
        .coffee-card .card-header:hover { background: linear-gradient(135deg,#552E21 0%,#2E1508 100%); }

        .card-title-section { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-date { font-size: 12px; opacity: .9; }

        .card-description {
            font-size: 12px;
            opacity: .82;
            line-height: 1.45;
        }

        .toggle-icon {
            font-size: 18px;
            flex-shrink: 0;
            transition: transform .3s;
            margin-top: 2px;
        }

        .travel-card.expanded .toggle-icon { transform: rotate(180deg); }

        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height .35s ease;
            background: var(--bg);
        }

        .travel-card.expanded .card-content {
            max-height: 820px;
            padding: 20px;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            border: none;
            min-height: 600px;
            border-radius: var(--rs);
            background: white;
        }

        /* ── Section dividers ── */
        .section-sep {
            border: none;
            border-top: 1px solid var(--bdr);
            margin: 4px 0 28px;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--sub);
            font-size: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--bdr);
        }

        /* ── Mobile tweaks ── */
        @media (max-width: 640px) {
            .w { padding: 16px 12px 40px; }
            h1 { font-size: 19px; }
            .card-header { padding: 14px 16px; }
            .card-title { font-size: 15px; }
            .travel-card.expanded .card-content { max-height: 640px; padding: 14px; }
            iframe { min-height: 500px; }
        }
    </style>
</head>
<body>
    <div class="w">
        <div class="page-header">
            <h1>Tse</h1>
            <p class="hero-sub">Personal notes — travel plans, coffee recipes &amp; more</p>
        </div>

        <!-- ── TRAVEL PLANS ── -->
        <p class="cat-label">✈️ Travel Plans</p>
        <hr class="section-sep">
        <div class="cards-grid">

            <div class="travel-card" data-trip="jinguashi">
                <button class="card-header" type="button" aria-expanded="false">
                    <div class="card-title-section">
                        <div class="card-title">⛏️ 金瓜石山城小旅行</div>
                        <div class="card-date">June 29–30, 2026 · 自駕兩天一夜</div>
                        <div class="card-description">北投行義路出發，野柳地質公園、黃金博物館、無耳茶壺山、九份夜景。</div>
                    </div>
                    <div class="toggle-icon" aria-hidden="true">▼</div>
                </button>
                <div class="card-content">
                    <iframe src="travel/jinguashi_2d1n_jun29.html" title="金瓜石兩天一夜" loading="lazy"></iframe>
                </div>
            </div>

            <div class="travel-card" data-trip="canada">
                <button class="card-header" type="button" aria-expanded="false">
                    <div class="card-title-section">
                        <div class="card-title">🍁 Canada Trip — 6 People</div>
                        <div class="card-date">October 1–12, 2026</div>
                        <div class="card-description">Day-by-day plans, accommodation & activities across multiple cities.</div>
                    </div>
                    <div class="toggle-icon" aria-hidden="true">▼</div>
                </button>
                <div class="card-content">
                    <iframe src="travel/canada_6pax_oct1_12.html" title="Canada Trip Itinerary" loading="lazy"></iframe>
                </div>
            </div>

            <div class="travel-card" data-trip="hokuriku">
                <button class="card-header" type="button" aria-expanded="false">
                    <div class="card-title-section">
                        <div class="card-title">🏯 Hokuriku Trip 2026</div>
                        <div class="card-date">November 21–29, 2026</div>
                        <div class="card-description">Local attractions, cultural sites &amp; dining in the Hokuriku region.</div>
                    </div>
                    <div class="toggle-icon" aria-hidden="true">▼</div>
                </button>
                <div class="card-content">
                    <iframe src="travel/hokuriku_trip_2026.html" title="Hokuriku Trip Itinerary" loading="lazy"></iframe>
                </div>
            </div>

        </div>

        <!-- ── COFFEE ── -->
        <p class="cat-label">☕ Coffee</p>
        <hr class="section-sep">
        <div class="cards-grid">

            <div class="travel-card coffee-card" data-trip="neo-brew">
                <button class="card-header" type="button" aria-expanded="false">
                    <div class="card-title-section">
                        <div class="card-title">🏆 粕谷哲 NEO BREW 十次沖煮法</div>
                        <div class="card-date">2016 世界手沖大賽冠軍 · 2026 年度配方</div>
                        <div class="card-description">超粗研磨 × 長時間萃取 · 10 次注水 · Comandante 40–45 Clicks · 95–96 °C</div>
                    </div>
                    <div class="toggle-icon" aria-hidden="true">▼</div>
                </button>
                <div class="card-content">
                    <iframe src="coffee/tetsu_kasuya_neo_brew.html" title="Tetsu Kasuya NEO BREW Recipe" loading="lazy"></iframe>
                </div>
            </div>

        </div>

        <div class="footer">
            <p>Built with care · Updated 2026</p>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.travel-card');

        cards.forEach(card => {
            const header = card.querySelector('.card-header');

            header.addEventListener('click', (e) => {
                e.stopPropagation();
                const isExpanded = card.classList.contains('expanded');

                cards.forEach(c => {
                    c.classList.remove('expanded');
                    c.querySelector('.card-header').setAttribute('aria-expanded', 'false');
                });

                if (!isExpanded) {
                    card.classList.add('expanded');
                    header.setAttribute('aria-expanded', 'true');
                    if (window.innerWidth <= 640) {
                        setTimeout(() => header.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
                    }
                }
            });

            header.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    header.click();
                }
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.travel-card')) {
                cards.forEach(c => {
                    c.classList.remove('expanded');
                    c.querySelector('.card-header').setAttribute('aria-expanded', 'false');
                });
            }
        });
    </script>
</body>
</html>
